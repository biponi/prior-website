name: Deploy Luxury Branch to DigitalOcean

on:
  push:
    branches:
      - luxury
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"

      - name: Install all dependencies
        run: yarn install --frozen-lockfile

      - name: Build Next.js application
        run: yarn build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
          NEXT_PUBLIC_GTM_ID: ${{ secrets.NEXT_PUBLIC_GTM_ID }}

      - name: Bundle production dependencies
        run: |
          mkdir -p prod_deps
          cp package.json yarn.lock prod_deps/
          cd prod_deps
          yarn install --production --frozen-lockfile
          cd ..
          tar -czf node_modules.tar.gz -C prod_deps node_modules/
          rm -rf prod_deps

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DO_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to DigitalOcean
        run: |
          # Create deployment directory if it doesn't exist
          ssh -i ~/.ssh/deploy_key ${{ secrets.DO_USER }}@${{ secrets.DO_HOST }} \
            "mkdir -p /luxury-website"

          # Upload build artifacts and production files from project root
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            --include='.next/***' \
            --include='public/***' \
            --include='package.json' \
            --include='yarn.lock' \
            --include='next.config.mjs' \
            --include='ecosystem.config.js' \
            --include='node_modules.tar.gz' \
            --exclude='*' \
            ./ \
            ${{ secrets.DO_USER }}@${{ secrets.DO_HOST }}:/luxury-website/

          # Remote: extract deps and restart PM2
          ssh -i ~/.ssh/deploy_key ${{ secrets.DO_USER }}@${{ secrets.DO_HOST }} << 'ENDSSH'
            # Explicitly extend PATH to ensure PM2/node are found in non-interactive shell
            export PATH="$PATH:/usr/local/bin:/usr/bin:$HOME/.yarn/bin:$HOME/.npm-global/bin"

            cd /luxury-website

            # Extract production node_modules
            tar -xzf node_modules.tar.gz
            rm node_modules.tar.gz

            # Restart application with PM2
            if command -v pm2 > /dev/null 2>&1; then
              if pm2 describe prior-luxury > /dev/null 2>&1; then
                pm2 restart prior-luxury
              else
                pm2 start ecosystem.config.js
              fi
              pm2 save
            else
              echo "PM2 not found, falling back to next start"
              pkill -f "next start" || true
              nohup yarn start > /dev/null 2>&1 &
            fi
          ENDSSH

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

      - name: Deployment summary
        if: success()
        run: |
          echo "## Deployment Summary :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** luxury" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Server:** ${{ secrets.DO_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Directory:** /luxury-website" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** Successfully deployed :white_check_mark:" >> $GITHUB_STEP_SUMMARY
